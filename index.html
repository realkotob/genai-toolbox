<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Our Documentation Has a New Home</title>
    <style>
      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
        background: #f8f9fa; 
        color: #202124; 
      }
      .container { 
        text-align: center; 
        padding: 3rem; 
        background: white; 
        border-radius: 12px; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border-top: 8px solid #80a7e9; /* Primary color */
        max-width: 500px;
      }
      h1 { color: #4484f4; margin-top: 0; } /* Secondary color */
      a { color: #4484f4; text-decoration: none; font-weight: 500; }
      a:hover { text-decoration: underline; }
      #timer-box {
        margin: 20px 0;
        font-size: 1.1rem;
      }
      #timer { 
        font-weight: bold; 
        font-size: 1.5rem; 
        color: #80a7e9; /* Primary color */
      }
      .footer {
        margin-top: 20px;
        font-size: 0.9rem;
        color: #5f6368;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Our Documentation Has a New Home</h1>
      <p>You are being redirected to our new <strong>v1 docsite</strong>.</p>
      
      <div id="timer-box">
        Redirecting in <span id="timer">5</span> seconds...
      </div>

      <div class="footer">
        If you are not redirected, <a href="https://mcp-toolbox.dev/">click here to visit mcp-toolbox.dev</a>.
      </div>
    </div>

    <script>
      let seconds = 5;
      const display = document.getElementById('timer');
      const destination = "https://mcp-toolbox.dev/";

      const countdown = setInterval(() => {
        seconds--;
        display.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(countdown);
          window.location.replace(destination);
        }
      }, 1000);
    </script>
  </body>
</html>
